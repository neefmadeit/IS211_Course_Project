<html><body>
<h2>Book Catalogue</h2>
<a href="/logout">Logout</a>

<h3>Add Book</h3>
<form method="POST">
<input name="isbn" placeholder="ISBN">
<button>Add</button>
</form>

{% if error %}<p style="color:red">{{ error }}</p>{% endif %}

<table border="1">
<tr><th>Title</th><th>Author</th><th>Pages</th><th>Rating</th><th>Delete</th></tr>
{% for b in books %}
<tr>
<td>{{ b[1] }}</td>
<td>{{ b[2] }}</td>
<td>{{ b[3] }}</td>
<td>{{ b[4] }}</td>
<td><a href="/delete/{{ b[0] }}">Delete</a></td>
</tr>
{% endfor %}
</table>
</body></html>
